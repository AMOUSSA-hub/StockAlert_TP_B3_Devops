name: CI/CD StockAlert

on:
  push:
    branches: [main, staging]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1 : TESTS ─────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test

  # ── JOB 2 : LINT ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier le style du code
        run: npm run lint

  # ── JOB 3 : BUILD + TRIVY + PUSH ──────────────────────────────────
  # Déclenché UNIQUEMENT sur tag v* OU push staging
  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      
      # Suite des steps...
      - name: Définir le tag image
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Builder l'image Docker
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }} .

      - name: Scan de sécurité Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:latest image \
            --exit-code 1 \
            --severity CRITICAL \
            ${{ secrets.DOCKER_USERNAME }}/tp3_devops:${{ steps.vars.outputs.tag }}

      - name: Connexion au Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push sur Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tp3_devops:${{ steps.vars.outputs.tag }}
>>>>>>> Stashed changes

  # ── JOB 4 : DEPLOY STAGING ────────────────────────────────────────
  # Déclenché UNIQUEMENT sur push vers la branche staging
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Déployer en staging
        run: |
          echo "🔵 Déploiement en staging"
          echo "Image : ${{ secrets.DOCKER_USERNAME }}/stockalert:staging"
          echo "✅ Staging mis à jour"
